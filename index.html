<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>戰鬥陀螺競技場 · GHS 蓋厚勝</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-elev: #14141c;
  --bg-glass: rgba(255,255,255,0.04);
  --bg-glass-strong: rgba(255,255,255,0.08);
  --gold: #FFD166;
  --orange: #FF6B35;
  --teal: #00D4AA;
  --line-green: #06C755;
  --text-primary: #f4f4f8;
  --text-secondary: #9a9aa8;
  --border-subtle: rgba(255,255,255,0.08);
  --border-gold: rgba(255,209,102,0.3);
  --grid-line: rgba(255,209,102,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg-base); }
body {
  background: transparent;
  color: var(--text-primary);
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.idle-bg {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  animation: idle-entry 3.4s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
}
.idle-tint {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.15) 0%, rgba(10,10,15,0.35) 55%, rgba(10,10,15,0.65) 100%);
}
@keyframes idle-entry {
  0%   { opacity: 0; transform: scale(1.18); filter: brightness(1.4) blur(8px); }
  18%  { opacity: 1; }
  45%  { opacity: 1; transform: scale(1.06); filter: brightness(1.1) blur(0px); }
  100% { opacity: 0.85; transform: scale(1); filter: brightness(1) blur(0px); }
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  opacity: 0.5;
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(220,38,38,0.10), transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(139,92,246,0.10), transparent 70%);
  pointer-events: none;
}
.mono { font-family: 'Orbitron', monospace; letter-spacing: 0.05em; }

.header {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(10,10,15,0.7);
  border-bottom: 1px solid var(--border-subtle);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.user-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 4px;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 999px;
  font-size: 12px;
  flex-shrink: 0;
}
.user-pill .avatar-svg {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFD166, #FF6B35);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.user-pill .avatar-svg svg { width: 24px; height: 24px; transform: translateY(2px); }
.metrics { display: flex; flex: 1; justify-content: flex-end; align-items: center; }
.metric {
  display: flex; flex-direction: column; align-items: center;
  padding: 2px 10px;
  border-left: 1px solid var(--border-subtle);
}
.metric:first-child { border-left: none; }
.metric .label {
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  font-weight: 500;
}
.metric .value {
  font-family: 'Orbitron', monospace;
  font-size: 14px; font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 12px rgba(255,209,102,0.5);
}
.metric.teal .value { color: var(--teal); text-shadow: 0 0 12px rgba(0,212,170,0.5); }

.stage { position: relative; z-index: 1; padding: calc(env(safe-area-inset-top, 0px) + 28px) 14px 140px; max-width: 480px; margin: 0 auto; }
.title-block { text-align: center; padding: 12px 0 20px; }
.kicker {
  font-size: 13px; letter-spacing: 0.3em;
  color: var(--orange);
  margin-bottom: 8px;
  position: relative; display: inline-block;
  font-weight: 700;
}
.kicker::before, .kicker::after {
  content: ''; position: absolute; top: 50%; width: 24px; height: 1px;
  background: linear-gradient(to right, transparent, var(--orange));
}
.kicker::before { right: calc(100% + 10px); transform: scaleX(-1); }
.kicker::after { left: calc(100% + 10px); }
.title {
  font-size: 40px; font-weight: 900;
  line-height: 1.05;
  background: linear-gradient(135deg, #FBBF24 0%, #F97316 50%, #DC2626 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.subtitle { font-size: 14px; color: var(--text-secondary); letter-spacing: 0.05em; line-height: 1.5; }

.round-info {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  margin-bottom: 14px;
}
.round-info .num { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: var(--gold); }
.round-info .lbl { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.1em; margin-bottom: 2px; }

.bey-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.bey-card {
  position: relative;
  padding: 12px;
  background: linear-gradient(180deg, var(--bg-glass-strong), var(--bg-glass));
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  aspect-ratio: 3 / 4;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  perspective: 800px;
}
.bey-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 30%, var(--accent, var(--gold)) 250%);
  opacity: 0.10;
  pointer-events: none;
  z-index: 1;
}
.bey-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 1;
  z-index: 0;
  pointer-events: none;
  -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 70%, rgba(0,0,0,0.55) 92%, transparent 100%);
  mask-image: linear-gradient(180deg, #000 0%, #000 70%, rgba(0,0,0,0.55) 92%, transparent 100%);
}
.bey-card[data-id="gaiye"] .bey-bg { transform: scaleX(-1); }
.bey-mask {
  position: absolute;
  right: 0; bottom: 0;
  width: 100px; height: 100px;
  background: radial-gradient(circle at bottom right,
    rgba(0,0,0,0.92) 0%,
    rgba(0,0,0,0.6) 45%,
    rgba(0,0,0,0.25) 70%,
    transparent 100%);
  z-index: 2;
  pointer-events: none;
  border-bottom-right-radius: inherit;
}
.bey-fx {
  position: absolute; inset: 0;
  z-index: 1;
  pointer-events: none;
  border-radius: inherit;
  overflow: hidden;
}
.bey-fx::before {
  content: ''; position: absolute; inset: -2px;
  background: radial-gradient(ellipse at 50% 30%, var(--accent-glow, rgba(255,209,102,0.3)) 0%, transparent 65%);
  opacity: 0.45;
  mix-blend-mode: screen;
  animation: fx-pulse 3.2s ease-in-out infinite alternate;
}
.bey-fx::after {
  content: ''; position: absolute;
  top: -50%; left: -75%;
  width: 60%; height: 200%;
  background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
  transform: skewX(-18deg);
  animation: fx-sweep 4.8s ease-in-out infinite;
  mix-blend-mode: screen;
}
@keyframes fx-pulse {
  from { opacity: 0.25; }
  to { opacity: 0.65; }
}
@keyframes fx-sweep {
  0% { left: -75%; }
  55%, 100% { left: 130%; }
}
.bey-card[data-selected="true"] .bey-fx::before { opacity: 0.9; animation-duration: 1.6s; }
.bey-card[data-selected="true"] .bey-fx::after { animation-duration: 2.4s; }
.bey-card > .bey-winrate,
.bey-card > .bey-visual,
.bey-card > .bey-name,
.bey-card > .bey-type,
.bey-card > .bey-stats { position: relative; z-index: 2; }
.bey-card[data-selected="true"] {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-glow, rgba(255,209,102,0.4));
  transform: translateY(-3px);
}
.bey-card[data-selected="true"]::after {
  content: '已選';
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; letter-spacing: 0.1em;
  padding: 3px 8px;
  background: var(--accent);
  color: #0a0a0f;
  border-radius: 4px;
  font-weight: 900;
}
.bey-visual {
  position: absolute;
  right: 4px; bottom: 4px;
  width: 88px; height: 88px;
  pointer-events: none;
  z-index: 3;
}
.bey-card .bey-name,
.bey-card .bey-type,
.bey-card .bey-stats { padding-right: 96px; }
.bey-visual::before {
  content: '';
  position: absolute;
  left: 6%; right: 6%;
  bottom: -8px; height: 16px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.78) 0%, transparent 70%);
  filter: blur(4px);
  z-index: 0;
  animation: shadow-pulse 2.2s ease-in-out infinite alternate;
}
.bey-visual::after {
  content: '';
  position: absolute; inset: -14% -14% -2% -14%;
  background:
    radial-gradient(ellipse 60% 35% at 50% 55%, var(--accent-glow, rgba(255,209,102,0.5)) 0%, transparent 65%);
  filter: blur(6px);
  z-index: 0;
  animation: aura-pulse 2.6s ease-in-out infinite alternate;
  mix-blend-mode: screen;
}
.bey-tilt {
  position: absolute; inset: 0;
  z-index: 2;
  animation: bey-bob 2.4s ease-in-out infinite alternate;
}
@keyframes bey-bob {
  from { transform: translateY(0) rotate(-2deg); }
  to   { transform: translateY(-3px) rotate(2deg); }
}
.bey-tilt::before {
  content: '';
  position: absolute; inset: 4%;
  border-radius: 50%;
  background:
    conic-gradient(from 0deg, transparent 0deg, var(--accent, #FFD166) 30deg, transparent 60deg, transparent 180deg, var(--accent, #FFD166) 210deg, transparent 240deg, transparent 360deg);
  filter: blur(2px);
  opacity: 0.65;
  transform: translateZ(-3px);
  animation: spin calc(var(--spin-speed, 3s) * 0.55) linear infinite reverse;
  mix-blend-mode: screen;
}
.bey-tilt::after {
  content: '';
  position: absolute; inset: -8%;
  border: 1.5px solid var(--accent, #FFD166);
  border-radius: 50%;
  opacity: 0.6;
  transform: translateZ(2px);
  box-shadow:
    0 0 12px var(--accent-glow, rgba(255,209,102,0.6)),
    inset 0 0 10px var(--accent-glow, rgba(255,209,102,0.4));
  animation: ring-pulse 1.8s ease-in-out infinite alternate;
}
.bey-tilt svg,
.bey-tilt img {
  width: 100%; height: 100%;
  position: relative; z-index: 3;
  animation: spin var(--spin-speed, 3s) linear infinite;
  object-fit: contain;
  filter:
    drop-shadow(0 2px 0 rgba(0,0,0,0.65))
    drop-shadow(0 4px 0 rgba(0,0,0,0.4))
    drop-shadow(0 10px 16px var(--accent-glow, rgba(0,0,0,0.5)));
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bey-precess {
  from { transform: rotateX(60deg) rotateZ(-12deg) translateY(0); }
  to   { transform: rotateX(66deg) rotateZ(-6deg)  translateY(-4px); }
}
@keyframes shadow-pulse {
  from { transform: scaleX(1);    opacity: 0.85; }
  to   { transform: scaleX(0.85); opacity: 0.5; }
}
@keyframes aura-pulse {
  from { opacity: 0.5; transform: scale(1); }
  to   { opacity: 0.95; transform: scale(1.08); }
}
@keyframes ring-pulse {
  from { opacity: 0.35; box-shadow: 0 0 6px var(--accent-glow), inset 0 0 6px var(--accent-glow); }
  to   { opacity: 0.85; box-shadow: 0 0 22px var(--accent-glow), inset 0 0 14px var(--accent-glow); }
}
.bey-card[data-selected="true"] .bey-tilt::after { opacity: 1; animation-duration: 0.9s; }
.bey-card[data-selected="true"] .bey-visual::after { opacity: 1; }
.bey-name { font-size: 18px; font-weight: 900; color: var(--text-primary); margin-bottom: 3px; letter-spacing: 0.04em; line-height: 1.15; }
.bey-type { font-size: 12px; color: var(--accent); letter-spacing: 0.12em; font-weight: 700; margin-bottom: 10px; }
.bey-stats { display: flex; gap: 5px; }
.bey-stat { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.bey-stat .lbl { font-size: 10px; color: var(--text-secondary); font-weight: 500; }
.bey-stat .bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.bey-stat .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 2px; }
.bey-winrate {
  position: absolute; top: 10px; left: 10px;
  font-family: 'Orbitron', monospace;
  font-size: 14px; font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.05em;
  z-index: 1;
  text-shadow: 0 0 10px var(--accent-glow);
}

.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px;
}
.section-head .lbl {
  font-size: 15px;
  letter-spacing: 0.15em;
  color: var(--gold);
  font-weight: 700;
}
.section-head .lbl::before {
  content: '◆';
  margin-right: 8px;
  color: var(--orange);
}
.section-head .meta {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.15em;
}
.prize-progress {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
}
.prize-progress .num {
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 12px rgba(255,209,102,0.5);
}
.prize-progress .next { color: var(--teal); font-weight: 700; }
.prize-scroll {
  display: flex; gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  margin: 0 -14px 24px;
  padding: 0 14px 12px;
  scrollbar-width: none;
}
.prize-scroll::-webkit-scrollbar { display: none; }
.prize-card {
  flex: 0 0 132px;
  background:
    linear-gradient(180deg, var(--bg-glass-strong), var(--bg-glass));
  border: 1px dashed var(--border-gold);
  border-radius: 12px;
  scroll-snap-align: start;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 10px 12px;
  text-align: center;
  position: relative;
  transition: all 0.25s ease;
}
.prize-card .tier {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
  font-weight: 700;
}
.prize-card .tier strong {
  color: var(--gold);
  font-size: 22px;
  font-weight: 900;
  margin-right: 2px;
}
.prize-card .cash {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 900;
  color: var(--orange);
  letter-spacing: 0.02em;
  margin: 6px 0 4px;
  line-height: 1.1;
}
.prize-card .cash .unit {
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
  margin-right: 2px;
  font-weight: 500;
}
.prize-card .bonus {
  font-size: 11px;
  color: var(--teal);
  letter-spacing: 0.05em;
  font-weight: 700;
  padding: 4px 8px;
  background: rgba(0,212,170,0.10);
  border: 1px solid rgba(0,212,170,0.25);
  border-radius: 6px;
  margin-top: 4px;
  line-height: 1.3;
}
.prize-card .lock {
  position: absolute; top: 8px; right: 8px;
  font-size: 12px;
  opacity: 0.55;
}
.prize-card[data-state="unlocked"] {
  border-style: solid;
  border-color: var(--gold);
  background: linear-gradient(180deg, rgba(255,209,102,0.10), rgba(255,107,53,0.04));
  box-shadow: 0 0 16px rgba(255,209,102,0.18);
}
.prize-card[data-state="unlocked"] .lock { opacity: 0; }
.prize-card[data-state="unlocked"]::after {
  content: '可兌換';
  position: absolute; top: 6px; right: 6px;
  font-size: 9px; letter-spacing: 0.1em;
  padding: 2px 6px;
  background: var(--gold); color: #0a0a0f;
  border-radius: 3px;
  font-weight: 900;
}
.prize-card[data-state="next"] {
  border-color: var(--teal);
  border-style: solid;
  box-shadow: 0 0 12px rgba(0,212,170,0.18);
}
.prize-card[data-state="next"]::after {
  content: '下一檔';
  position: absolute; top: 6px; right: 6px;
  font-size: 9px; letter-spacing: 0.1em;
  padding: 2px 6px;
  background: var(--teal); color: #0a0a0f;
  border-radius: 3px;
  font-weight: 900;
}

.battle-btn {
  position: fixed;
  left: 14px; right: 14px; bottom: 14px;
  max-width: 452px;
  margin: 0 auto;
  padding: 20px;
  background: linear-gradient(135deg, #DC2626, #F97316, #FBBF24);
  color: #0a0a0f;
  font-weight: 900;
  font-size: 19px;
  letter-spacing: 0.22em;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(220,38,38,0.4), 0 0 60px rgba(251,191,36,0.2);
  z-index: 40;
  transition: all 0.2s;
}
.battle-btn:disabled {
  background: var(--bg-glass-strong);
  color: var(--text-secondary);
  box-shadow: none;
  cursor: not-allowed;
}
.battle-btn:not(:disabled):active { transform: translateY(2px); }

.mascot {
  position: fixed;
  bottom: 90px; right: 12px;
  z-index: 30;
  display: flex; align-items: flex-end; gap: 6px;
  animation: mascot-bob 1.6s cubic-bezier(0.5, 0, 0.5, 1) infinite alternate;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
@keyframes mascot-bob {
  0%   { transform: translateY(0) rotate(-1.2deg); }
  50%  { transform: translateY(-3px) rotate(0.6deg); }
  100% { transform: translateY(-9px) rotate(1.6deg); }
}
.mascot.poke .figure { animation: mascot-poke 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes mascot-poke {
  0%   { transform: scale(1) rotate(0); }
  35%  { transform: scale(1.18) rotate(-8deg); }
  65%  { transform: scale(0.94) rotate(6deg); }
  100% { transform: scale(1) rotate(0); }
}
.mascot .bubble { transition: opacity 0.18s ease, transform 0.18s ease; }
.mascot .bubble.swap { opacity: 0; transform: translateY(4px) scale(0.96); }
.mascot .bubble {
  background: var(--bg-glass-strong);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-subtle);
  padding: 10px 14px;
  border-radius: 14px 14px 4px 14px;
  font-size: 13px;
  max-width: 180px;
  line-height: 1.5;
  color: var(--text-primary);
}
.mascot .figure {
  width: 92px; height: 130px;
  object-fit: contain;
  filter: drop-shadow(0 6px 18px rgba(255,209,102,0.35));
  flex-shrink: 0;
}

.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(ellipse at center, #15151f 0%, #08080d 70%);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  overflow: hidden;
}
.overlay-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 1;
  pointer-events: none;
}
.overlay::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(8,8,13,0) 0%, rgba(8,8,13,0.55) 80%);
  pointer-events: none;
}
.overlay > .battle-hud,
.overlay > .arena,
.overlay > .your-pick { position: relative; z-index: 2; }
.overlay.show { display: flex; animation: fadein 0.3s ease; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.battle-hud {
  position: absolute; top: 24px; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start; padding: 0 20px;
  z-index: 2;
}
.battle-status {
  font-size: 11px; letter-spacing: 0.2em;
  color: var(--orange);
  padding: 6px 10px;
  border: 1px solid var(--orange);
  border-radius: 4px;
  font-weight: 700;
  animation: status-blink 1.4s ease infinite;
}
@keyframes status-blink { 50% { opacity: 0.5; } }
.timer-pill {
  font-family: 'Orbitron', monospace;
  font-size: 32px; font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.05em;
  text-shadow: 0 0 24px var(--gold);
}

.arena {
  width: min(320px, 85vw); aspect-ratio: 1;
  position: relative;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, rgba(220,38,38,0.10), transparent 70%),
    repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255,209,102,0.04) 10deg 11deg);
  box-shadow:
    inset 0 0 0 2px rgba(255,209,102,0.2),
    inset 0 0 60px rgba(220,38,38,0.15),
    0 0 80px rgba(220,38,38,0.1);
}
.arena::before {
  content: ''; position: absolute; inset: 12px;
  border-radius: 50%;
  border: 1px dashed rgba(255,209,102,0.15);
}
.arena::after {
  content: ''; position: absolute; inset: 36px;
  border-radius: 50%;
  border: 1px dashed rgba(255,209,102,0.1);
}
.arena-bey {
  position: absolute;
  width: 56px; height: 56px;
  top: 50%; left: 50%;
  margin-top: -28px; margin-left: -28px;
  transform: translate(var(--x, 0px), var(--y, 0px));
  transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
}
.arena-bey svg, .arena-bey img { width: 100%; height: 100%; animation: spin 0.5s linear infinite; object-fit: contain; }
.arena-bey.knocked {
  opacity: 0;
  transition: transform 0.9s ease, opacity 0.9s ease;
}
.arena-bey.winner { animation: winner-glow 1s ease infinite alternate; }
@keyframes winner-glow {
  from { filter: drop-shadow(0 0 6px var(--accent)) drop-shadow(0 0 12px var(--accent)); }
  to { filter: drop-shadow(0 0 16px var(--accent)) drop-shadow(0 0 32px var(--accent)); }
}

.your-pick {
  margin-top: 24px;
  font-size: 12px; color: var(--text-secondary);
  letter-spacing: 0.1em;
  text-align: center;
}
.your-pick strong { color: var(--gold); font-weight: 700; }

.result {
  position: fixed; inset: 0; z-index: 110;
  background: rgba(8,8,13,0.92); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.result.show { display: flex; animation: fadein 0.4s ease; }
.result-card {
  width: 100%; max-width: 360px;
  padding: 32px 24px; text-align: center;
  background: linear-gradient(180deg, var(--bg-glass-strong), var(--bg-elev));
  border: 1px solid var(--border-gold);
  border-radius: 18px;
  position: relative;
  overflow: hidden;
}
.result-card.win { border-color: var(--gold); box-shadow: 0 0 40px rgba(255,209,102,0.3); }
.result-card.lose { border-color: rgba(255,255,255,0.1); }
.result-bey-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  margin: -8px auto 18px;
  max-width: 320px;
}
.result-bey-strip .slot {
  position: relative;
  aspect-ratio: 3 / 4;
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid var(--border-subtle);
  background: var(--bg-glass);
  opacity: 0.45;
  filter: grayscale(0.55);
  transition: all 0.45s cubic-bezier(0.34, 1.4, 0.64, 1);
}
.result-bey-strip .slot img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.result-bey-strip .slot .nm {
  position: absolute; left: 0; right: 0; bottom: 0;
  font-size: 10px; font-weight: 900;
  text-align: center;
  padding: 3px 2px;
  color: var(--text-primary);
  background: linear-gradient(180deg, transparent, rgba(0,0,0,0.85));
  letter-spacing: 0.05em;
}
.result-bey-strip .slot.winner {
  opacity: 1;
  filter: none;
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255,209,102,0.55), inset 0 0 0 1px rgba(255,209,102,0.4);
  transform: translateY(-4px) scale(1.05);
  z-index: 2;
}
.result-bey-strip .slot.winner .nm { background: linear-gradient(180deg, transparent, rgba(255,150,30,0.9)); color: #fff; }
.result-bey-strip .slot.winner::after {
  content: '勝';
  position: absolute; top: 4px; right: 4px;
  font-size: 9px; font-weight: 900;
  background: var(--gold); color: #0a0a0f;
  padding: 1px 5px; border-radius: 3px;
  letter-spacing: 0.05em;
}
.result-card.win .result-bey-strip .slot.winner { animation: winner-pulse 0.8s ease; }
@keyframes winner-pulse {
  0%, 100% { transform: translateY(-4px) scale(1.05); }
  40% { transform: translateY(-8px) scale(1.12) rotate(-2deg); }
  70% { transform: translateY(-2px) scale(1.03) rotate(1deg); }
}
.result-tag {
  display: inline-block;
  padding: 5px 16px;
  font-size: 13px; letter-spacing: 0.2em;
  border-radius: 4px;
  margin-bottom: 18px;
  font-weight: 900;
}
.result-tag.win { background: var(--gold); color: #0a0a0f; }
.result-tag.lose { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: 1px solid var(--border-subtle); }
.result-title {
  font-size: 38px; font-weight: 900;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
  line-height: 1.1;
}
.result-card.win .result-title {
  background: linear-gradient(135deg, #FBBF24, #F97316, #DC2626);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-card.lose .result-title { color: var(--text-primary); }
.result-detail { font-size: 15px; color: var(--text-secondary); margin-bottom: 22px; line-height: 1.6; }
.ticket-gain {
  padding: 18px;
  background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(0,212,170,0.02));
  border: 1px solid rgba(0,212,170,0.25);
  border-radius: 12px;
  margin-bottom: 18px;
}
.ticket-gain .num {
  font-family: 'Orbitron', monospace;
  font-size: 44px; font-weight: 900;
  color: var(--teal);
  line-height: 1;
  margin-bottom: 6px;
}
.ticket-gain .lbl { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.1em; }
.line-cta {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px;
  background: var(--line-green);
  color: #fff;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.1em;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
  margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(6,199,85,0.3);
  transition: transform 0.2s;
}
.line-cta:active { transform: translateY(1px); }
.line-cta svg { width: 24px; height: 24px; }
.result-btn {
  width: 100%; padding: 16px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.1em;
  border-radius: 12px;
  cursor: pointer;
}

.confetti { position: absolute; width: 8px; height: 8px; pointer-events: none; top: 0; }
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0); opacity: 1; }
  100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
}

.footnote { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 24px; letter-spacing: 0.1em; opacity: 0.6; }

@media (max-width: 360px) {
  .title { font-size: 32px; }
  .bey-name { font-size: 16px; }
  .bey-visual { width: 96px; height: 96px; }
  .bey-card .bey-name, .bey-card .bey-type, .bey-card .bey-stats { padding-right: 88px; }
  .battle-btn { font-size: 17px; padding: 18px; letter-spacing: 0.18em; }
  .mascot { bottom: 92px; }
  .mascot .bubble { font-size: 12px; max-width: 150px; }
  .mascot .figure { width: 74px; height: 104px; }
  .result-title { font-size: 32px; }
}
</style>
</head>

<script>
const STATE = { chances: 3, tickets: 128, wins: 0, picked: null, busy: false };

const PRIZES = [
  { hits: 3,  cash: 888,    bonus: '' },
  { hits: 5,  cash: 2888,   bonus: '' },
  { hits: 10, cash: 8888,   bonus: '' },
  { hits: 15, cash: 16888,  bonus: '' },
  { hits: 20, cash: 26000,  bonus: '' },
  { hits: 30, cash: 60000,  bonus: '新光禮卷 200' },
  { hits: 40, cash: 140000, bonus: '新光禮卷 500' },
  { hits: 50, cash: 250000, bonus: '新光禮卷 1000' },
];

function fmtCash(n) { return 'NT$ ' + n.toLocaleString(); }

function renderPrizes() {
  const scroll = document.getElementById('prize-scroll');
  const wins = STATE.wins;
  const next = PRIZES.find(p => p.hits > wins);
  scroll.innerHTML = PRIZES.map(p => {
    let state = 'locked';
    if (wins >= p.hits) state = 'unlocked';
    else if (next && p.hits === next.hits) state = 'next';
    return `
      <div class="prize-card" data-state="${state}">
        <div class="tier"><strong>${p.hits}</strong> 次中獎</div>
        <div class="cash"><span class="unit">NT$</span>${p.cash.toLocaleString()}</div>
        ${p.bonus ? `<div class="bonus">+ ${p.bonus}</div>` : `<div class="bonus" style="opacity:0;pointer-events:none">—</div>`}
        ${state === 'locked' ? '<span class="lock">🔒</span>' : ''}
      </div>
    `;
  }).join('');
  document.getElementById('prize-current').textContent = wins;
  const nextEl = document.getElementById('prize-next');
  const metaEl = document.getElementById('prize-meta');
  if (next) {
    nextEl.textContent = `· 再 ${next.hits - wins} 次解鎖 ${fmtCash(next.cash)}${next.bonus ? ' + ' + next.bonus : ''}`;
    metaEl.textContent = `下一檔 ${next.hits} 次`;
  } else {
    nextEl.textContent = '· 全部已解鎖';
    metaEl.textContent = '已達最高';
  }
}

const BEYS = [
  {
    id: 'gaiye', name: '小蓋爺', type: '持久型',
    accent: '#DC2626', sub: '#FBBF24', accentGlow: 'rgba(220,38,38,0.5)',
    stats: { atk: 55, def: 70, sta: 92 }, winrate: 53, spinSpeed: 1.0,
    iconType: 'mahjong', image: 'bey-gaiye.png'
  },
  {
    id: 'kuei', name: '瘋狂小葵', type: '攻擊型',
    accent: '#F97316', sub: '#EC4899', accentGlow: 'rgba(249,115,22,0.5)',
    stats: { atk: 95, def: 40, sta: 55 }, winrate: 58, spinSpeed: 0.55,
    iconType: 'sunburst', image: 'bey-kuei.png'
  },
  {
    id: 'popo', name: '點點富婆', type: '防禦型',
    accent: '#FBBF24', sub: '#0F172A', accentGlow: 'rgba(251,191,36,0.5)',
    stats: { atk: 45, def: 95, sta: 70 }, winrate: 51, spinSpeed: 0.85,
    iconType: 'diamond', image: 'bey-popo.svg'
  },
  {
    id: 'yo', name: '雷殘小祐', type: '平衡型',
    accent: '#8B5CF6', sub: '#3B82F6', accentGlow: 'rgba(139,92,246,0.5)',
    stats: { atk: 72, def: 72, sta: 72 }, winrate: 49, spinSpeed: 0.75,
    iconType: 'lightning', image: 'bey-yo.png'
  },
];

// High-metal Beyblade-style SVG: layered metallic body + sub-color rim + signature center icon
function beySvg(b) {
  const main = b.accent, sub = b.sub;
  const gradId = `g-${b.id}-${Math.random().toString(36).slice(2,7)}`;

  let icon = '';
  if (b.iconType === 'mahjong') {
    icon = `
      <rect x="40" y="40" width="20" height="20" rx="2" fill="#0F172A" stroke="${sub}" stroke-width="1.2"/>
      <rect x="48" y="44" width="4" height="12" fill="${main}"/>
      <rect x="44" y="47" width="12" height="4" fill="none" stroke="${main}" stroke-width="1.4"/>
    `;
  } else if (b.iconType === 'sunburst') {
    icon = `
      <g fill="${sub}">
        ${[0,45,90,135,180,225,270,315].map(a => `<polygon points="50,30 53,42 47,42" transform="rotate(${a} 50 50)"/>`).join('')}
      </g>
      <circle cx="50" cy="50" r="8" fill="${main}"/>
      <circle cx="50" cy="50" r="4" fill="#FBBF24"/>
    `;
  } else if (b.iconType === 'diamond') {
    icon = `
      <polygon points="50,36 60,48 50,64 40,48" fill="${main}"/>
      <polygon points="50,36 60,48 50,48 40,48" fill="#fff" opacity="0.55"/>
      <polygon points="40,48 50,48 50,64" fill="#0F172A" opacity="0.35"/>
      <polygon points="60,48 50,48 50,64" fill="#0F172A" opacity="0.55"/>
      <polygon points="50,36 60,48 40,48" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.8"/>
    `;
  } else if (b.iconType === 'lightning') {
    icon = `
      <polygon points="46,36 56,36 50,46 56,46 44,64 49,52 43,52" fill="${sub}" stroke="#FBBF24" stroke-width="0.6"/>
    `;
  }

  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>

}

function renderBeys() {
  const grid = document.getElementById('bey-grid');
  grid.innerHTML = BEYS.map(b => `
    <div class="bey-card" data-id="${b.id}" data-selected="false"
         style="--accent: ${b.accent}; --accent-glow: ${b.accentGlow}; --spin-speed: ${b.spinSpeed * 4}s">
      ${b.image ? `<img class="bey-bg" src="${b.image}" alt="" loading="lazy">` : ''}
      <div class="bey-mask"></div>
      <div class="bey-fx"></div>
      <div class="bey-winrate">${b.winrate}%</div>
      <div class="bey-visual"><div class="bey-tilt"><img src="bey-top-${b.id}.png" alt=""></div></div>
      <div class="bey-name">${b.name}</div>
      <div class="bey-type">${b.type}</div>
      <div class="bey-stats">
        <div class="bey-stat"><span class="lbl">攻擊</span><div class="bar"><span style="width:${b.stats.atk}%"></span></div></div>
        <div class="bey-stat"><span class="lbl">防禦</span><div class="bar"><span style="width:${b.stats.def}%"></span></div></div>
        <div class="bey-stat"><span class="lbl">持久</span><div class="bar"><span style="width:${b.stats.sta}%"></span></div></div>
      </div>
    </div>
  `).join('');
  grid.querySelectorAll('.bey-card').forEach(card => {
    card.addEventListener('click', () => {
      if (STATE.busy) return;
      const wasSelected = card.dataset.selected === 'true';
      grid.querySelectorAll('.bey-card').forEach(c => c.dataset.selected = 'false');
      card.dataset.selected = 'true';
      STATE.picked = card.dataset.id;
      const btn = document.getElementById('battle-btn');
      btn.disabled = false;
      btn.textContent = '開戰';
      if (!wasSelected) SFX.select();
    });
  });
}

function determineWinner() {
  const weights = BEYS.map(b => {
    const composite = b.stats.atk * 0.35 + b.stats.def * 0.30 + b.stats.sta * 0.35;
    return composite + (Math.random() - 0.5) * 50;
  });
  let max = -Infinity, winnerIdx = 0;
  weights.forEach((w, i) => { if (w > max) { max = w; winnerIdx = i; }});
  return BEYS[winnerIdx];
}

function startBattle() {
  if (!STATE.picked || STATE.chances <= 0 || STATE.busy) return;
  STATE.busy = true;
  SFX.start();
  if (idleBg) { try { idleBg.pause(); } catch(e){} }

  const overlay = document.getElementById('battle-overlay');
  const arena = document.getElementById('arena');
  const pickedBey = BEYS.find(b => b.id === STATE.picked);
  document.getElementById('picked-name').textContent = pickedBey.name;

  const winner = determineWinner();
  const others = BEYS.filter(b => b.id !== winner.id).sort(() => Math.random() - 0.5);
  const knockoutOrder = others;

  arena.innerHTML = '';
  const positions = [
    { x: -90, y: -90 }, { x: 90, y: -90 }, { x: -90, y: 90 }, { x: 90, y: 90 },
  ];
  BEYS.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'arena-bey';
    div.id = `arena-${b.id}`;
    div.style.cssText = `--x: ${positions[i].x}px; --y: ${positions[i].y}px; --accent: ${b.accent};`;
    div.innerHTML = `<img src="bey-top-${b.id}.png" alt="" style="width:100%;height:100%;object-fit:contain">`;
    arena.appendChild(div);
  });

  overlay.classList.add('show');
  const bgVideo = document.getElementById('overlay-bg');

  const VIDEO_DURATION = 10;
  const KNOCKOUT_TIMES = [1.8, 3.4, 5.0];
  const WINNER_TIME = 5.5;
  const RESULT_TIME = VIDEO_DURATION;
  const knockedSet = new Set();
  let winnerShown = false, resulted = false;
  document.getElementById('timer').textContent = `00:10`;

  const moveInterval = setInterval(() => {
    BEYS.forEach((b) => {
      const el = document.getElementById(`arena-${b.id}`);
      if (el && !el.classList.contains('knocked') && !el.classList.contains('winner')) {
        const angle = Math.random() * Math.PI * 2;
        const r = 40 + Math.random() * 60;
        el.style.setProperty('--x', `${Math.cos(angle) * r}px`);
        el.style.setProperty('--y', `${Math.sin(angle) * r}px`);
      }
    });
  }, 700);

  const onTime = () => {
    const ct = bgVideo.currentTime;
    const display = Math.max(1, 10 - Math.floor(ct));
    document.getElementById('timer').textContent = `00:${String(display).padStart(2, '0')}`;
    KNOCKOUT_TIMES.forEach((kt, i) => {
      if (ct >= kt && !knockedSet.has(i)) {
        knockedSet.add(i);
        const b = knockoutOrder[i];
        if (!b) return;
        const el = document.getElementById(`arena-${b.id}`);
        if (!el) return;
        el.classList.add('knocked');
        const angle = Math.random() * Math.PI * 2;
        el.style.setProperty('--x', `${Math.cos(angle) * 220}px`);
        el.style.setProperty('--y', `${Math.sin(angle) * 220}px`);
      }
    });
    if (!winnerShown && ct >= WINNER_TIME) {
      winnerShown = true;
      clearInterval(moveInterval);
      const el = document.getElementById(`arena-${winner.id}`);
      el.classList.add('winner');
      el.style.setProperty('--x', '0px');
      el.style.setProperty('--y', '0px');
    }
    if (!resulted && ct >= RESULT_TIME) {
      resulted = true;
      bgVideo.removeEventListener('timeupdate', onTime);
      showResult(winner, pickedBey);
    }
  };

  const startSync = () => {
    setTimeout(() => {
      BEYS.forEach((b) => {
        const el = document.getElementById(`arena-${b.id}`);
        const angle = Math.random() * Math.PI * 2;
        const r = 50 + Math.random() * 30;
        el.style.setProperty('--x', `${Math.cos(angle) * r}px`);
        el.style.setProperty('--y', `${Math.sin(angle) * r}px`);
      });
    }, 200);
    bgVideo.addEventListener('timeupdate', onTime);
  };

  if (bgVideo) {
    bgVideo.loop = false;
    bgVideo.currentTime = 0;
    bgVideo.muted = false;
    bgVideo.volume = 0.85;
    bgVideo.addEventListener('playing', startSync, { once: true });
    bgVideo.play().catch(() => { bgVideo.muted = true; bgVideo.play().catch(()=>{}); startSync(); });
  } else {
    startSync();
  }
}

function showResult(winner, picked) {
  const won = winner.id === picked.id;
  STATE.chances--;
  document.getElementById('chances').textContent = `${STATE.chances}/3`;

  if (won) {
    STATE.tickets++;
    STATE.wins++;
    document.getElementById('tickets').textContent = STATE.tickets;
    renderPrizes();
  }

  const card = document.getElementById('result-card');
  const tag = document.getElementById('result-tag');
  const title = document.getElementById('result-title');
  const detail = document.getElementById('result-detail');
  const gain = document.getElementById('ticket-gain');
  const strip = document.getElementById('result-strip');
  const lineCta = document.getElementById('line-cta');

  strip.innerHTML = BEYS.map(b => `
    <div class="slot ${b.id === winner.id ? 'winner' : ''}">
      ${b.image ? `<img src="${b.image}" alt="">` : ''}
      <div class="nm">${b.name}</div>
    </div>
  `).join('');

  if (won) {
    SFX.win();
    card.className = 'result-card win';
    tag.className = 'result-tag win';
    tag.textContent = '中獎';
    title.textContent = '押對了';
    detail.innerHTML = `<strong style="color:var(--gold)">${winner.name}</strong> 勝出，本場押注命中。<br>獲勝 +1，請前往官方 LINE 確認領取。`;
    gain.style.display = '';
    lineCta.style.display = 'flex';
    spawnConfetti(card);
  } else {
    SFX.lose();
    card.className = 'result-card lose';
    tag.className = 'result-tag lose';
    tag.textContent = '再接再厲';
    title.textContent = '差一點';
    detail.innerHTML = `<strong style="color:${winner.accent}">${winner.name}</strong> 勝出。<br>你押的是 ${picked.name}，今日剩 ${STATE.chances} 次機會。`;
    gain.style.display = 'none';
    lineCta.style.display = 'none';
  }

  document.getElementById('battle-overlay').classList.remove('show');
  const bgVideo = document.getElementById('overlay-bg');
  if (bgVideo) bgVideo.pause();
  document.getElementById('result').classList.add('show');
}

function spawnConfetti(parent) {
  const colors = ['#FBBF24', '#F97316', '#DC2626', '#8B5CF6', '#EC4899'];
  for (let i = 0; i < 36; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      transform: rotate(${Math.random() * 360}deg);
      animation: confetti-fall ${1.2 + Math.random() * 0.8}s ease-out ${Math.random() * 0.4}s forwards;
    `;
    parent.appendChild(c);
  }
}

const idleBg = document.getElementById('idle-bg');
const overlayBg = document.getElementById('overlay-bg');

(function bootIdleBg() {
  const v = idleBg;
  if (!v) return;
  v.muted = true;
  v.playsInline = true;
  v.volume = 0.55;
  const tryPlay = () => v.play().catch(() => {});
  tryPlay();
  v.addEventListener('canplay', tryPlay, { once: true });
  v.addEventListener('loadeddata', tryPlay, { once: true });
  const fadeIn = () => {
    v.muted = false;
    let t = 0;
    const target = 0.55;
    v.volume = 0;
    const id = setInterval(() => {
      t += 0.06;
      v.volume = Math.min(target, t);
      if (v.volume >= target) clearInterval(id);
    }, 90);
  };
  const unlock = () => {
    tryPlay();
    fadeIn();
    document.removeEventListener('pointerdown', unlock);
    document.removeEventListener('touchstart', unlock);
    document.removeEventListener('keydown', unlock);
  };
  document.addEventListener('pointerdown', unlock, { once: true });
  document.addEventListener('touchstart', unlock, { once: true });
  document.addEventListener('keydown', unlock, { once: true });
})();

const SFX = (() => {
  let ctx = null;
  const ensure = () => {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) ctx = new AC();
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  const tone = ({ freq = 440, dur = 0.12, type = 'sine', gain = 0.18, slide = 0, delay = 0 } = {}) => {
    const c = ensure();
    if (!c) return;
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  };
  const noise = ({ dur = 0.18, gain = 0.12, hp = 800, delay = 0 } = {}) => {
    const c = ensure();
    if (!c) return;
    const t0 = c.currentTime + delay;
    const len = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, len, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filt = c.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = hp;
    const g = c.createGain();
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt).connect(g).connect(c.destination);
    src.start(t0);
    src.stop(t0 + dur);
  };
  return {
    select() { tone({ freq: 720, dur: 0.08, type: 'triangle', gain: 0.18, slide: 360 }); tone({ freq: 1080, dur: 0.06, type: 'sine', gain: 0.12, delay: 0.04 }); },
    hover()  { tone({ freq: 520, dur: 0.05, type: 'sine', gain: 0.10 }); },
    start()  { tone({ freq: 220, dur: 0.18, type: 'sawtooth', gain: 0.22, slide: 280 }); tone({ freq: 660, dur: 0.22, type: 'square', gain: 0.14, delay: 0.06, slide: 220 }); noise({ dur: 0.22, gain: 0.10, hp: 600, delay: 0.02 }); },
    win()    { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone({ freq: f, dur: 0.18, type: 'triangle', gain: 0.18, delay: i * 0.10 })); },
    lose()   { tone({ freq: 392, dur: 0.22, type: 'sawtooth', gain: 0.16, slide: -160 }); tone({ freq: 261, dur: 0.32, type: 'triangle', gain: 0.14, delay: 0.18, slide: -80 }); }
  };
})();
